<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Trading CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4f0;--surface:#fff;--surface2:#faf8f5;--border:#e8e2da;--border2:#d6cfc6;
  --text:#1c1a17;--text2:#6b6560;--text3:#9c9590;
  --amber:#c9820a;--amber-light:#fef3dc;--amber-border:#f5d48a;
  --green:#2d7a4f;--green-light:#edf7f2;--green-border:#9fd4b8;
  --blue:#1e6fa8;--blue-light:#e8f4fd;--blue-border:#8ec8f0;
  --red:#c0392b;--red-light:#fdecea;--red-border:#f5b7b1;
  --orange:#e07b00;--orange-light:#fff3e0;--orange-border:#ffcc80;
  --teal:#0d7a6e;--teal-light:#e6f7f5;--teal-border:#7dd3cb;
  --stone-dark:#3d3832;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-icon{width:48px;height:48px;background:var(--stone-dark);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.auth-name{font-size:20px;font-weight:800}.auth-sub{font-size:12px;color:var(--text3);margin-top:2px}
.auth-err{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}

#app{display:none;flex-direction:column;height:100vh}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:11px}
.tb-icon{width:34px;height:34px;background:var(--stone-dark);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:800}.tb-co{font-size:11px;color:var(--text3);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.user-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--text2);font-weight:500}
.tabs-bar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;display:flex;gap:2px;flex-shrink:0}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;font-family:'Inter',sans-serif}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* CUSTOMERS TABLE */
#tab-customers{flex:1;overflow:hidden;display:flex;flex-direction:column}
.ctable-toolbar{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:var(--surface)}
.search-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;display:flex;align-items:center;gap:7px;flex:1;min-width:160px}
.search-box input{border:none;background:none;outline:none;width:100%;font-size:13px;font-family:'Inter',sans-serif;color:var(--text)}
.fsel-sm{border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.tab-content-layout{flex:1;overflow:hidden;display:flex}
.ctable-wrap{flex:1;overflow:auto}
.ctable{width:100%;border-collapse:collapse;font-size:13px}
.ctable th{background:var(--surface2);padding:9px 14px;text-align:left;font-weight:700;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.ctable td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctable tr.data-row{cursor:pointer;transition:background .12s}
.ctable tr.data-row:hover td{background:#f5f0ea}
.ctable tr.priority-high td{background:#dbeeff;border-left:4px solid #1565c0}
.ctable tr.priority-high:hover td{background:#c4dfff}
.ctable tr.priority-medium td{background:#d6f5e3;border-left:4px solid #1b7a3e}
.ctable tr.priority-medium:hover td{background:#b8edce}
.ctable tr.priority-low td{background:#fffbdd;border-left:4px solid #c9820a}
.ctable tr.priority-low:hover td{background:#fff4a0}
.ctable tr.sel-row td{background:#e8e8e8!important;border-left:3px solid var(--stone-dark)!important}
.follow-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--orange)}
.follow-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.row-num{color:var(--text3);font-size:11px;font-weight:600;min-width:24px}

/* DETAIL PANEL */
.detail-panel{width:430px;flex-shrink:0;border-left:1.5px solid var(--border);overflow-y:auto;background:var(--surface);display:none}
.detail-panel.open{display:flex;flex-direction:column}
.dhead{padding:14px 16px;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.dname{font-size:16px;font-weight:800;line-height:1.2}
.dtabs{display:flex;gap:3px;margin-top:10px;flex-wrap:wrap}
.dtab{padding:5px 12px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:8px;transition:all .2s;font-family:'Inter',sans-serif}
.dtab.active{background:var(--stone-dark);color:#fff}
.dbody{padding:14px}

/* FOLLOW TOGGLE */
.follow-toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;background:none;font-family:'Inter',sans-serif}
.follow-toggle.off{color:var(--text3);border-color:var(--border)}.follow-toggle.off:hover{border-color:var(--orange);color:var(--orange)}
.follow-toggle.on{color:var(--orange);border-color:var(--orange);background:var(--orange-light)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:500;white-space:nowrap}
.b-stone{background:#f2ede8;color:#5a524a;border-color:var(--border)}
.b-amber{background:var(--amber-light);color:#8a5a00;border-color:var(--amber-border)}
.b-green{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.b-blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.b-red{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.b-orange{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border)}
.b-teal{background:var(--teal-light);color:var(--teal);border-color:var(--teal-border)}
.b-purple{background:#f5e8ff;color:#6a1a9a;border-color:#d4a8f5}
.b-tr{background:#fff3e0;color:#7a4000;border-color:#ffcc80}
.b-ir{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}

/* FORMS */
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fi,.fsel,.fta{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--amber)}.fta{resize:vertical;min-height:64px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fgrid .full{grid-column:1/-1}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;font-weight:500;background:var(--surface2);color:var(--text2)}
.chip.ca{background:var(--amber);color:#fff;border-color:var(--amber)}.chip.cd{background:var(--stone-dark);color:#fff;border-color:var(--stone-dark)}
.radio-group{display:flex;flex-wrap:wrap;gap:6px}
.radio-chip{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;background:var(--surface2);color:var(--text2);transition:all .18s}
.radio-chip.active{background:var(--stone-dark);color:#fff;border-color:var(--stone-dark)}
.check-row{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text2)}
.check-row input{width:15px;height:15px;accent-color:var(--amber);cursor:pointer}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .18s}
.btn-primary{background:var(--amber);color:#fff}.btn-primary:hover{background:#b57209}
.btn-secondary{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:7px}
.btn-row{display:flex;gap:8px;margin-top:14px}.btn-row .btn{flex:1}
.btn-dashed{width:100%;border:2px dashed var(--border);border-radius:var(--r);padding:10px;font-size:13px;color:var(--text3);cursor:pointer;background:none;font-family:'Inter',sans-serif;font-weight:600;transition:all .2s;margin-bottom:10px}
.btn-dashed:hover{border-color:var(--amber);color:var(--amber)}
.btn-new{background:var(--amber);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-new:hover{background:#b57209}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,14,8,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:620px;max-height:92vh;overflow-y:auto;border:1.5px solid var(--border)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:1}
.modal-title{font-size:15px;font-weight:800}
.modal-close{width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:20px;color:var(--text3);border-radius:7px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}.modal-body{padding:20px}

/* FOLLOW-UP PANEL */
.follow-panel{background:var(--orange-light);border:1.5px solid var(--orange-border);border-radius:var(--r);padding:12px;margin-bottom:14px}
.follow-panel-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:8px}
.follow-item{background:#fff;border:1px solid var(--orange-border);border-radius:9px;padding:9px 11px;margin-bottom:7px}
.follow-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.follow-item-img{width:56px;height:56px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer;margin-top:5px}
.icon-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:5px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--red-light);color:var(--red)}

/* WISHLIST */
.wish-add{background:var(--amber-light);border:1.5px solid var(--amber-border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.wish-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:8px}
.wish-sel{font-size:11px;border:1px solid var(--border);border-radius:7px;padding:3px 7px;font-family:'Inter',sans-serif;background:var(--surface);outline:none;cursor:pointer}

/* ORDER TRACKER */
.ord-card{border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;background:var(--surface)}
.ord-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ord-title{font-weight:700;font-size:14px}.ord-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ord-meta{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:8px}
.ord-meta-item{display:flex;align-items:center;gap:4px}
.agent-box{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px}
.agent-title{font-weight:700;color:var(--blue);margin-bottom:5px;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.prog-track{background:var(--bg);border-radius:99px;height:5px;margin-bottom:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--amber);transition:width .4s}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:8px}
.steps-list{display:flex;flex-direction:column;gap:4px;max-height:360px;overflow-y:auto;padding-right:2px}
.step{border-radius:10px;border:1px solid var(--border);padding:8px 10px;transition:all .15s}
.step.done{background:var(--green-light);border-color:var(--green-border)}
.step.active{background:var(--amber-light);border-color:var(--amber-border)}
.step.future{background:var(--surface2);opacity:.5}
.step-row{display:flex;align-items:center;gap:7px}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sn-done{background:var(--green);color:#fff}.sn-active{background:var(--amber);color:#fff}.sn-future{background:var(--border);color:var(--text3)}
.step-lbl{font-size:12px;font-weight:500;flex:1;line-height:1.3}
.sl-done{color:var(--green)}.sl-active{color:#8a5a00;font-weight:600}.sl-future{color:var(--text3)}
.step-date{font-size:10px;color:var(--text3);white-space:nowrap}
.step-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.step-note{width:100%;margin-top:5px;border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:11px;font-family:'Inter',sans-serif;outline:none;background:#fff}
.step-note:focus{border-color:var(--amber)}
.step-files{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.step-file-item{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;text-decoration:none;color:var(--text2)}
.step-file-item:hover{border-color:var(--blue);color:var(--blue)}
.file-upload-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px dashed var(--border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;transition:all .15s}
.file-upload-btn:hover{border-color:var(--amber);color:var(--amber)}

/* ORDERS TAB */
#tab-orders{flex:1;overflow:hidden;display:none;flex-direction:column}
.orders-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;background:var(--surface)}
.orders-grid-wrap{flex:1;overflow-y:auto;padding:14px}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* PROFILE */
.psec{margin-bottom:14px}
.psec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.info-row{display:flex;flex-wrap:wrap;gap:5px}
hr.div{border:none;border-top:1px solid var(--border);margin:12px 0}
.contact-info-box{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px}

/* MISC */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:200px;color:var(--text3);text-align:center;gap:8px}
.empty .eicon{font-size:36px;opacity:.4}.empty p{font-size:13px;font-weight:500}
.loader{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text3);font-size:13px;gap:8px}
.spin{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--stone-dark);color:#fff;padding:10px 20px;border-radius:11px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-overlay img{max-width:90vw;max-height:90vh;border-radius:12px}
.required-mark{color:var(--red);margin-left:2px}
.section-divider{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-icon" style="background:transparent;padding:2px"><img src="https://stone-crm-storage.sales-b7d.workers.dev/logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:10px"></div><div><div class="auth-name">Stone Trading CRM</div><div class="auth-sub">Sign in to your account</div></div></div>
    <div class="auth-err" id="auth-err"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="l-email" placeholder="you@company.com" autocomplete="email"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()" id="l-btn">Sign In</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-left"><div style="width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0"><img src="https://stone-crm-storage.sales-b7d.workers.dev/logo.png" style="width:100%;height:100%;object-fit:contain"></div><div><div class="tb-title">Stone Trading CRM</div><div class="tb-co" id="tb-co">—</div></div></div>
    <div class="tb-right"><span class="user-badge" id="user-badge">—</span><button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button></div>
  </div>
  <div class="tabs-bar" id="tabs-bar"></div>
  <div class="main">
    <div id="tab-customers" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div class="ctable-toolbar">
        <div class="search-box"><span style="color:var(--text3)">🔍</span><input type="text" placeholder="Search customers..." id="search-inp" oninput="renderTable()"></div>
        <select class="fsel-sm" id="co-filter" onchange="coFilterChanged(this.value)" style="display:none"><option value="">All Companies</option></select>
        <select class="fsel-sm" id="cat-filter" onchange="renderTable()">
          <option value="">All Categories</option>
          <option>Marble</option><option>Travertine</option><option>Granite</option><option>Onyx</option>
          <option>Traonyx</option><option>Marbonyx</option><option>Limestone</option><option>Basalt</option><option>Quartzite</option><option>Sandstone</option>
        </select>
        <select class="fsel-sm" id="follow-filter" onchange="renderTable()"><option value="">All Priorities</option><option value="follow">🔵🟢 High & Medium</option><option value="high">🔵 High Only</option></select>
        <select class="fsel-sm" id="returning-filter" onchange="renderTable()"><option value="">All Customers</option><option value="returning">🔁 Returning</option></select>
        <button class="btn-new" onclick="openAddCustomer()">+ New Customer</button>
      </div>
      <div class="tab-content-layout">
        <div class="ctable-wrap" id="ctable-wrap"><div class="loader"><div class="spin"></div> Loading...</div></div>
        <div class="detail-panel" id="detail-panel"><div class="empty"><div class="eicon">👆</div><p>Select a customer</p></div></div>
      </div>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}
function fileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
  if(ext==='pdf') return '📄';
  if(['mp4','mov','avi'].includes(ext)) return '🎥';
  if(['xlsx','xls','csv'].includes(ext)) return '📊';
  return '📎';
}

// R2 FILE UPLOAD
async function uploadToR2(file,folder){
  const ext=file.name.split('.').pop();
  const key=`${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const res=await fetch(`${R2_URL}/${key}`,{
    method:'POST',body:file,
    headers:{'Content-Type':file.type,'X-Api-Key':R2_KEY}
  });
  if(!res.ok) throw new Error('Upload failed');
  const data=await res.json();
  return{key,name:file.name,url:`${R2_URL}/${key}`};
}

let wishlistCounts={};
async function loadCustomers(){
  document.getElementById('ctable-wrap').innerHTML='<div class="loader"><div class="spin"></div> Loading...</div>';
  let q=sb.from('customers').select('*');
  if(!isAdmin()) q=q.eq('company_id',currentProfile.company_id);
  else if(companyFilter) q=q.eq('company_id',companyFilter);
  const {data,error}=await q;
  if(error){showToast('Error loading');return;}
  customers=sortCustomers(data||[]);
  // load wishlist counts
  const ids=(data||[]).map(c=>c.id);
  if(ids.length){
    const {data:wl}=await sb.from('wishlists').select('customer_id').in('customer_id',ids);
    wishlistCounts={};
    (wl||[]).forEach(w=>{wishlistCounts[w.customer_id]=(wishlistCounts[w.customer_id]||0)+1;});
  }
  renderTable();
}
const PRIORITY_ORDER={high:0,medium:1,low:2,null:3,undefined:3};
function sortCustomers(list){
  const priority=list.filter(c=>c.priority==='high').sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
  const medium=list.filter(c=>c.priority==='medium').sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
  const rest=list.filter(c=>!c.priority||c.priority==='low'||c.priority==='none').sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
  return[...priority,...medium,...rest];
}
function renderTable(){
  const hasMultipleCompanies=new Set(customers.map(c=>c.company_id)).size>1;
  const q=document.getElementById('search-inp').value.trim().toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const filterPri=document.getElementById('follow-filter').value;
  const followOnly=filterPri==='follow'||filterPri==='high';
  const retFilter=document.getElementById('returning-filter')?.value||'';
  let list=customers.filter(c=>{
    const ms=!q||c.name.toLowerCase().includes(q)||(c.contact_value||'').toLowerCase().includes(q);
    const mc=!cat||(c.interests?.categories||[]).includes(cat);
    const mf=!filterPri||(filterPri==='follow'?(c.priority==='high'||c.priority==='medium'):c.priority===filterPri);
    const mr=!retFilter||c.is_returning;
    return ms&&mc&&mf&&mr;
  });

  el.innerHTML=`<div style="padding:6px 14px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)">${list.length} customers${fc?` · <span style="color:var(--red);font-weight:600">🔵 ${fc} high</span>`:''}${fm?` · <span style="color:var(--orange);font-weight:600">🟢 ${fm} medium</span>`:''}</div>
  <table class="ctable"><thead><tr>
    <th>#</th><th>Customer</th><th>Categories</th><th>Product</th><th>Max Price</th><th>Channel</th>
    ${isAdmin()&&!companyFilter&&hasMultipleCompanies?'<th>Company</th>':''}
    <th style="text-align:center">⭐</th><th style="text-align:center">🔁</th><th>Updated</th><th></th>
  </tr></thead><tbody>
  ${list.map((c,i)=>{
    const ch=CH_CONFIG[c.preferred_channel]||CH_CONFIG.whatsapp;
    const cats=(c.interests?.categories||[]).slice(0,2).map(t=>badge(t)).join('');

      <td style="text-align:center">${wishlistCounts[c.id]?`<span style="background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">${wishlistCounts[c.id]}</span>`:''}</td>

  }).join('')}

}

  else if(detailTab==='wishlist') body=renderWishlist(c,wl||[]);
  else body=renderOrdersDetail(c,ords||[]);

      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0"><div class="dname" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</div>
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px">
            ${co?badge(co.name,co.country==='TR'?'b-tr':'b-ir'):''}
            ${(c.product_types||[]).map(t=>badge(t,'b-blue')).join('')}
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;outline:none;background:var(--surface)" onchange="setPriority('${c.id}',this.value)">
            <option value="" ${!c.priority||c.priority===''?'selected':''}>— Priority</option>
            <option value="high" ${c.priority==='high'?'selected':''}>🔵 High</option>
            <option value="medium" ${c.priority==='medium'?'selected':''}>🟢 Medium</option>
            <option value="low" ${c.priority==='low'?'selected':''}>🟡 Low</option>
          </select>
          <button class="btn btn-sm" style="${c.is_returning?'background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7':'background:var(--surface2);color:var(--text3);border:1px solid var(--border)'}" onclick="toggleReturning('${c.id}',${c.is_returning})" title="Toggle returning customer">🔁</button>

          <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:1px solid var(--red-border)" onclick="deleteCustomer('${c.id}','${esc(c.name)}')">🗑</button>

}
function closeDetail(){selectedId=null;document.getElementById('detail-panel').classList.remove('open');renderTable()}
function setDTab(t){detailTab=t;renderDetail()}

async function deleteCustomer(id,name){
  if(!confirm('Delete customer "'+name+'"?\n\nThis will also delete all their wishlists and orders. This cannot be undone.')) return;
  await sb.from('orders').delete().eq('customer_id',id);
  await sb.from('wishlists').delete().eq('customer_id',id);
  const {error}=await sb.from('customers').delete().eq('id',id);
  if(error){showToast('Error: '+error.message);return;}
  customers=customers.filter(c=>c.id!==id);
  selectedId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderTable();
  showToast('Customer deleted');
}
async function toggleReturning(id,current){
  await sb.from('customers').update({is_returning:!current,updated_at:new Date().toISOString()}).eq('id',id);
  customers=sortCustomers(customers.map(c=>c.id===id?{...c,is_returning:!current}:c));
  renderTable();renderDetail();showToast(current?'Marked as new customer':'Marked as returning 🔁');
}
async function setPriority(id,priority){
  await sb.from('customers').update({priority,updated_at:new Date().toISOString()}).eq('id',id);
  customers=sortCustomers(customers.map(c=>c.id===id?{...c,priority,updated_at:new Date().toISOString()}:c));
  renderTable();renderDetail();showToast('Priority updated ✓');
}

    ${dimHtml?`<hr class="div"><div class="psec"><div class="psec-title">Dimensions</div>${dimHtml}</div>`:''}

// ORDERS IN DETAIL
function renderOrdersDetail(c,orders){
  const html=orders.map(o=>renderOrderCard(o,true)).join('');
  return`<button class="btn-dashed" onclick="openAddOrder('${c.id}','${esc(c.name)}','${c.company_id}')">+ New Order</button>
    ${orders.length===0?'<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px">No orders yet</div>':html}`;
}

function renderOrderCard(o,inDetail=false){
  const steps=o.transport_type==='T'?makeStepsT(o.port_of_load):makeStepsS(o.port_of_load);
  const pct=Math.round((o.current_step/(steps.length-1))*100);
  const cur=steps[o.current_step]?.l||'Completed ✓';
  const stepFiles=o.step_files||{};
  const stepNotes=o.step_notes||{};
  const stepDates=o.step_dates||{};
  const marks=o.stone_marks||[];
  const fin=o.financials||{receivables:[],payables:[]};
  const rec=fin.receivables||[];
  const pay=fin.payables||[];

  const stHtml=steps.map((s,i)=>{
    const done=i<o.current_step,active=i===o.current_step;
    const cls=done?'done':active?'active':'future';
    const note=stepNotes[s.k]||'';
    const date=stepDates[s.k]||'';
    const files=stepFiles[s.k]||[];
    const isLastDone=done&&(i===o.current_step-1);
    const filesHtml=files.map(f=>{
      const isImg=['jpg','jpeg','png','gif','webp'].includes((f.name||'').split('.').pop().toLowerCase());
      const isVid=['mp4','mov','avi','webm'].includes((f.name||'').split('.').pop().toLowerCase());
      if(isImg) return`<img src="${esc(f.url)}" onclick="previewFileModal('${esc(f.url)}','${esc(f.name)}','img')" style="width:56px;height:56px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer">`;
      if(isVid) return`<button class="step-file-item" onclick="previewFileModal('${esc(f.url)}','${esc(f.name)}','video')">${fileIcon(f.name)} ${esc(f.name.length>18?f.name.slice(0,16)+'…':f.name)}</button>`;
      return`<a class="step-file-item" href="${esc(f.url)}" target="_blank" title="${esc(f.name)}">${fileIcon(f.name)} ${esc(f.name.length>18?f.name.slice(0,16)+'…':f.name)}</a>`;
    }).join('');
    const uploadHtml=(active||done)&&s.files&&s.files.length?`<label class="file-upload-btn"><input type="file" style="display:none" accept="${getAccept(s.files)}" multiple onchange="uploadStepFiles('${o.id}','${s.k}',this)">📎 ${s.fileLabel||'Attach files'}</label>`:'';
    return`<div class="step ${cls}">
      <div class="step-row">
        <div class="step-num ${done?'sn-done':active?'sn-active':'sn-future'}">${done?'✓':i+1}</div>
        <span class="step-lbl ${done?'sl-done':active?'sl-active':'sl-future'}">${s.l}</span>
        ${date?`<span class="step-date">${date}</span>`:''}
        <div class="step-actions">
          ${active?`<button class="btn btn-primary btn-sm" onclick="completeStep('${o.id}','${s.k}',${i},${steps.length},'${inDetail}')">Done ✓</button>`:''}
          ${isLastDone?`<button class="btn btn-secondary btn-sm" onclick="undoStep('${o.id}',${i},'${inDetail}')" title="Undo last step">↩ Undo</button>`:''}
        </div>
      </div>
      ${(active||done)?`<input class="step-note" placeholder="Note..." value="${esc(note)}" onchange="saveStepNote('${o.id}','${s.k}',this.value)">`:''}
      ${filesHtml?`<div class="step-files" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">${filesHtml}</div>`:''}
      ${uploadHtml?`<div class="step-files" style="margin-top:5px">${uploadHtml}</div>`:''}
    </div>`;
  }).join('');

  // MARKS
  const marksHtml=`
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${marks.map((m,i)=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px">
        ${esc(m)}<button onclick="removeMark('${o.id}',${i},'${inDetail}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;line-height:1">×</button>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:6px">
      <input class="fi" id="mark-inp-${o.id}" placeholder="e.g. SM-001, A-23" style="flex:1">
      <button class="btn btn-secondary btn-sm" onclick="addMark('${o.id}','${inDetail}')">+ Add Mark</button>
    </div>`;

  // FINANCIALS
  const toUSD=(amount,currency,rate)=>{
    if(!amount) return 0;
    if(currency==='USD'||!rate) return parseFloat(amount)||0;
    // rate = 1 USD = X currency, so USD = amount / rate
    return (parseFloat(amount)||0)/(parseFloat(rate)||1);
  };
  const totalRec=rec.reduce((s,t)=>s+toUSD(t.amount,t.currency,t.usd_rate),0);
  const totalPay=pay.reduce((s,t)=>s+toUSD(t.amount,t.currency,t.usd_rate),0);
  const balance=totalRec-totalPay;
  const txRow=(t,i,type)=>{
    const filesHtml2=(t.files||[]).map(f=>`<a class="step-file-item" href="${esc(f.url)}" target="_blank">${fileIcon(f.name)} ${esc(f.name.length>16?f.name.slice(0,14)+'…':f.name)}</a>`).join('');
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:6px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
        <div style="flex:1">

function switchOrdTab(ordId,tab,btn){
  const tabs=btn.closest('[id^="otab-"]');
  tabs.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`osteps-${ordId}`).style.display=tab==='steps'?'':'none';
  document.getElementById(`omarks-${ordId}`).style.display=tab==='marks'?'':'none';
  document.getElementById(`ofin-${ordId}`).style.display=tab==='fin'?'':'none';
}

async function addMark(ordId,inDetail){
  const inp=document.getElementById(`mark-inp-${ordId}`);
  const val=inp.value.trim();if(!val){showToast('Enter mark');return;}
  const {data:ord}=await sb.from('orders').select('stone_marks').eq('id',ordId).single();
  const marks=[...(ord?.stone_marks||[]),val];
  await sb.from('orders').update({stone_marks:marks}).eq('id',ordId);
  inp.value='';showToast('Mark added ✓');
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}
async function removeMark(ordId,idx,inDetail){
  const {data:ord}=await sb.from('orders').select('stone_marks').eq('id',ordId).single();
  const marks=(ord?.stone_marks||[]).filter((_,i)=>i!==idx);
  await sb.from('orders').update({stone_marks:marks}).eq('id',ordId);
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}

function openAddTx(ordId,type,inDetail){
  openModal(type==='rec'?'Add Receivable':'Add Payable',`
    <div class="fg"><label class="fl">Description <span class="required-mark">*</span></label>
      <input class="fi" id="tx-desc" placeholder="${type==='rec'?'e.g. Advance Payment, Balance Payment':'e.g. Quarry payment, Freight, Customs fee'}">
    </div>
    <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px">
      <div class="fg"><label class="fl">Amount <span class="required-mark">*</span></label><input type="number" class="fi" id="tx-amount" placeholder="0"></div>
      <div class="fg"><label class="fl">Currency</label><select class="fsel" id="tx-currency" style="width:auto"><option value="USD" selected>USD</option><option value="EUR">EUR</option><option value="CNY">CNY</option><option value="TRY">TRY</option><option value="IRR">IRR</option></select></div>
    </div>
    <div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="tx-date"></div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" id="tx-notes" placeholder="Optional notes"></div>

    </div>`);

async function saveTx(ordId,type,inDetail){
  const desc=document.getElementById('tx-desc').value.trim();
  const amount=document.getElementById('tx-amount').value;
  if(!desc||!amount){showToast('Fill required fields');return;}
  const dateVal=document.getElementById('tx-date').value;
  const tx={desc,amount:parseFloat(amount),currency:document.getElementById('tx-currency').value,date:dateVal?new Date(dateVal).toLocaleDateString('en-GB'):'',notes:document.getElementById('tx-notes').value.trim(),files:[]};
  const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
  const fin=ord?.financials||{receivables:[],payables:[]};
  if(type==='rec') fin.receivables=[...(fin.receivables||[]),tx];
  else fin.payables=[...(fin.payables||[]),tx];
  await sb.from('orders').update({financials:fin}).eq('id',ordId);
  closeModal();showToast('Saved ✓');
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}

async function removeTx(ordId,type,idx,inDetail){
  const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
  const fin=ord?.financials||{receivables:[],payables:[]};
  if(type==='rec') fin.receivables=(fin.receivables||[]).filter((_,i)=>i!==idx);
  else fin.payables=(fin.payables||[]).filter((_,i)=>i!==idx);
  await sb.from('orders').update({financials:fin}).eq('id',ordId);
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}

async function uploadTxFile(ordId,type,idx,input,inDetail){
  const file=input.files[0];if(!file)return;
  showToast('Uploading...');
  try{
    const r=await uploadToR2(file,`orders/${ordId}/fin`);
    const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
    const fin=ord?.financials||{receivables:[],payables:[]};
    const arr=type==='rec'?fin.receivables:fin.payables;
    if(arr[idx]) arr[idx].files=[...(arr[idx].files||[]),{name:file.name,url:r.url}];
    await sb.from('orders').update({financials:fin}).eq('id',ordId);
    showToast('File attached ✓');
    if(inDetail==='true') renderDetail(); else renderAllOrders();
  }catch(e){showToast('Upload failed');}
}
function getAccept(types){
  const map={pdf:'.pdf',doc:'.doc,.docx',excel:'.xlsx,.xls,.csv',image:'image/*'};
  return types.map(t=>map[t]||'').filter(Boolean).join(',');
}

// STEP ACTIONS
async function deleteOrder(orderId,stoneName,inDetail){
  if(!confirm(`Delete order "${stoneName}"?\n\nThis cannot be undone.`)) return;
  const {error}=await sb.from('orders').delete().eq('id',orderId);
  if(error){showToast('Error: '+error.message);return;}
  showToast('Order deleted');
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}
async function completeStep(orderId,stepKey,stepIdx,totalSteps,inDetail){
  const newStep=Math.min(stepIdx+1,totalSteps-1);
  const {data:ord}=await sb.from('orders').select('step_dates').eq('id',orderId).single();
  const dates={...(ord?.step_dates||{}),[stepKey]:today()};
  await sb.from('orders').update({current_step:newStep,step_dates:dates}).eq('id',orderId);
  showToast('Step completed ✓');
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}
async function undoStep(orderId,stepIdx,inDetail){
  await sb.from('orders').update({current_step:stepIdx-1}).eq('id',orderId);
  showToast('Step undone ↩');
  if(inDetail==='true') renderDetail(); else renderAllOrders();
}
async function saveStepNote(orderId,stepKey,val){
  const {data:ord}=await sb.from('orders').select('step_notes').eq('id',orderId).single();
  await sb.from('orders').update({step_notes:{...(ord?.step_notes||{}),[stepKey]:val}}).eq('id',orderId);
}
async function uploadStepFiles(orderId,stepKey,input){
  const files=Array.from(input.files);if(!files.length)return;
  showToast(`Uploading ${files.length} file(s)...`);
  try{
    const {data:ord}=await sb.from('orders').select('step_files').eq('id',orderId).single();
    const sf={...(ord?.step_files||{})};
    for(const file of files){
      const r=await uploadToR2(file,`orders/${orderId}`);
      sf[stepKey]=[...(sf[stepKey]||[]),{name:file.name,url:r.url,key:r.key}];
    }
    await sb.from('orders').update({step_files:sf}).eq('id',orderId);
    showToast(`${files.length} file(s) uploaded ✓`);
    renderDetail();
  }catch(e){showToast('Upload failed: '+e.message);}
}

async function renderAllOrders(){

function renderOrdersList(){
  const listEl=document.getElementById('orders-list');

  listEl.innerHTML=allOrders.map(o=>{

      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">

          <div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(o.customers?.name||'')} ${co?'· '+co.name:''}</div>
        </div>
        ${badge(o.transport_type==='T'?'🚛':'🚢',o.transport_type==='T'?'b-amber':'b-blue')}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text3)">📍 ${esc(o.destination||'—')}</span>

      </div>
      <div style="background:var(--bg);border-radius:99px;height:5px;overflow:hidden;margin-bottom:4px">

        <span style="font-weight:700;color:var(--amber);flex-shrink:0">${pct}%</span>

      ${(totalRec||totalPay)?`<div style="margin-top:6px;display:flex;gap:6px">

let currentOrdTab='steps';
async function selectOrder(id,keepTab=false){
  if(!keepTab) currentOrdTab='steps';
  selectedOrderId=id;
  renderOrdersList();
  const panel=document.getElementById('order-detail-panel');
  panel.innerHTML='<div class="loader"><div class="spin"></div> Loading...</div>';
  const {data:o}=await sb.from('orders').select('*, customers(name,company_id)').eq('id',id).single();
  if(!o){panel.innerHTML='<div class="empty"><div class="eicon">📦</div><p>Not found</p></div>';return;}
  allOrders=allOrders.map(x=>x.id===id?o:x);
  renderOrderDetail(o);
}

function renderOrderDetail(o){
  const panel=document.getElementById('order-detail-panel');
  if(!panel) return;
  const co=companies.find(x=>x.id===o.customers?.company_id);
  const steps=o.transport_type==='T'?makeStepsT(o.port_of_load):makeStepsS(o.port_of_load);
  const pct=Math.round((o.current_step/(steps.length-1))*100);
  const cur=steps[o.current_step]?.l||'Completed ✓';
  const marks=o.stone_marks||[];
  const fin=o.financials||{receivables:[],payables:[]};
  const rec=fin.receivables||[];
  const pay=fin.payables||[];
  const toUSD=(amount,currency,rate)=>{
    if(!amount) return 0;
    if(currency==='USD'||!rate) return parseFloat(amount)||0;
    // rate = 1 USD = X currency, so USD = amount / rate
    return (parseFloat(amount)||0)/(parseFloat(rate)||1);
  };
  const totalRec=rec.reduce((s,t)=>s+toUSD(t.amount,t.currency,t.usd_rate),0);
  const totalPay=pay.reduce((s,t)=>s+toUSD(t.amount,t.currency,t.usd_rate),0);
  const balance=totalRec-totalPay;

  // STEPS HTML
  const stepFiles=o.step_files||{};
  const stepNotes=o.step_notes||{};
  const stepDates=o.step_dates||{};
  const stHtml=steps.map((s,i)=>{
    const done=i<o.current_step,active=i===o.current_step;
    const cls=done?'done':active?'active':'future';
    const note=stepNotes[s.k]||'';
    const date=stepDates[s.k]||'';
    const files=stepFiles[s.k]||[];
    const isLastDone=done&&(i===o.current_step-1);
    const filesHtml=files.map((f,fi)=>{
      const isImg=['jpg','jpeg','png','gif','webp'].includes((f.name||'').split('.').pop().toLowerCase());
      const isVid=['mp4','mov','avi','webm'].includes((f.name||'').split('.').pop().toLowerCase());
      const delBtn=`<button onclick="deleteStepFile('${o.id}','${s.k}',${fi})" style="position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:10px;line-height:1">×</button>`;
      if(isImg) return`<div style="position:relative;display:inline-block">${delBtn}<img src="${esc(f.url)}" onclick="previewFileModal('${esc(f.url)}','${esc(f.name)}','img')" style="width:56px;height:56px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer"></div>`;
      if(isVid) return`<span style="position:relative;display:inline-flex;align-items:center">${delBtn}<button class="step-file-item" onclick="previewFileModal('${esc(f.url)}','${esc(f.name)}','video')">${fileIcon(f.name)} ${esc(f.name.length>18?f.name.slice(0,16)+"…":f.name)}</button></span>`;
      return`<span style="position:relative;display:inline-flex;align-items:center;gap:3px"><a class="step-file-item" href="${esc(f.url)}" target="_blank">${fileIcon(f.name)} ${esc(f.name.length>18?f.name.slice(0,16)+"…":f.name)}</a><button onclick="deleteStepFile('${o.id}','${s.k}',${fi})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;padding:0">×</button></span>`;
    }).join('');
    const uploadHtml=(active||done)&&s.files&&s.files.length?`<label class="file-upload-btn"><input type="file" style="display:none" accept="${getAccept(s.files)}" multiple onchange="uploadStepFilesOrd('${o.id}','${s.k}',this)">📎 ${s.fileLabel||'Attach files'}</label>`:'';
    return`<div class="step ${cls}">
      <div class="step-row">
        <div class="step-num ${done?'sn-done':active?'sn-active':'sn-future'}">${done?'✓':i+1}</div>
        <span class="step-lbl ${done?'sl-done':active?'sl-active':'sl-future'}">${s.l}</span>
        ${date?`<span class="step-date">${date}</span>`:''}
        <div class="step-actions">
          ${active?`<button class="btn btn-primary btn-sm" onclick="completeStepOrd('${o.id}','${s.k}',${i},${steps.length})">Done ✓</button>`:''}
          ${isLastDone?`<button class="btn btn-secondary btn-sm" onclick="undoStepOrd('${o.id}',${i})">↩ Undo</button>`:''}
        </div>
      </div>

function switchOrdDetailTab(ordId,tab,btn){
  currentOrdTab=tab;
  const tabsEl=document.getElementById(`ord-tabs-${ordId}`);
  if(tabsEl) tabsEl.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`ord-steps-${ordId}`).style.display=tab==='steps'?'':'none';
  document.getElementById(`ord-packing-${ordId}`).style.display=tab==='packing'?'':'none';
  document.getElementById(`ord-fin-${ordId}`).style.display=tab==='fin'?'':'none';
}

async function deleteOrderOrd(orderId,stoneName){
  if(!confirm('Delete order "'+stoneName+'"?\n\nThis cannot be undone.')) return;
  await sb.from('orders').delete().eq('id',orderId);
  showToast('Order deleted');
  selectedOrderId=null;
  document.getElementById('order-detail-panel').innerHTML='<div class="empty"><div class="eicon">📦</div><p>Select an order</p></div>';
  await renderAllOrders();
}
async function completeStepOrd(orderId,stepKey,stepIdx,totalSteps){
  const newStep=Math.min(stepIdx+1,totalSteps-1);
  const {data:ord}=await sb.from('orders').select('step_dates').eq('id',orderId).single();
  const dates={...(ord?.step_dates||{}),[stepKey]:today()};
  await sb.from('orders').update({current_step:newStep,step_dates:dates}).eq('id',orderId);
  showToast('Step completed ✓');await selectOrder(orderId,true);renderOrdersList();
}
async function undoStepOrd(orderId,stepIdx){
  await sb.from('orders').update({current_step:stepIdx-1}).eq('id',orderId);
  showToast('Step undone ↩');await selectOrder(orderId,true);renderOrdersList();
}
async function saveStepNoteOrd(orderId,stepKey,val){
  const {data:ord}=await sb.from('orders').select('step_notes').eq('id',orderId).single();
  await sb.from('orders').update({step_notes:{...(ord?.step_notes||{}),[stepKey]:val}}).eq('id',orderId);
}
async function uploadStepFilesOrd(orderId,stepKey,input){
  const files=Array.from(input.files);if(!files.length)return;
  showToast(`Uploading ${files.length} file(s)...`);
  try{
    const {data:ord}=await sb.from('orders').select('step_files').eq('id',orderId).single();
    const sf={...(ord?.step_files||{})};
    for(const file of files){
      const r=await uploadToR2(file,'orders/'+orderId);
      sf[stepKey]=[...(sf[stepKey]||[]),{name:file.name,url:r.url}];
    }
    await sb.from('orders').update({step_files:sf}).eq('id',orderId);
    showToast(`${files.length} file(s) uploaded ✓`);await selectOrder(orderId,true);
  }catch(e){showToast('Upload failed: '+e.message);}
}

  const list=[...(ord?.packing_list||[]),{mark:'',quarry:'',dimensions:'',port_weight:'',container_no:'',description:''}];
  await sb.from('orders').update({packing_list:list}).eq('id',ordId);

}
async function removePackingRow(ordId,idx){

async function updatePackingRow(ordId,idx,field,val){
  const {data:ord}=await sb.from('orders').select('packing_list').eq('id',ordId).single();
  const list=[...(ord?.packing_list||[])];
  if(list[idx]) list[idx]={...list[idx],[field]:val};

}

// CONTAINER MEDIA
async function uploadContainerMedia(ordId,input){
  const files=Array.from(input.files);
  if(!files.length) return;
  showToast('Uploading...');
  try{
    const {data:ord}=await sb.from('orders').select('container_media').eq('id',ordId).single();
    const media=[...(ord?.container_media||[])];
    for(const file of files){
      const r=await uploadToR2(file,'orders/'+ordId+'/media');
      media.push({name:file.name,url:r.url});
    }
    await sb.from('orders').update({container_media:media}).eq('id',ordId);
    showToast('Uploaded ✓');await selectOrder(ordId,true);
  }catch(e){showToast('Upload failed');}
}
async function deleteContainerMedia(ordId,idx){
  const {data:ord}=await sb.from('orders').select('container_media').eq('id',ordId).single();
  const media=(ord?.container_media||[]).filter((_,i)=>i!==idx);
  await sb.from('orders').update({container_media:media}).eq('id',ordId);
  await selectOrder(ordId,true);
}

// DELETE STEP FILE
async function deleteStepFile(ordId,stepKey,fileIdx){
  if(!confirm('Remove this file?')) return;
  const {data:ord}=await sb.from('orders').select('step_files').eq('id',ordId).single();
  const sf={...(ord?.step_files||{})};
  if(sf[stepKey]) sf[stepKey]=sf[stepKey].filter((_,i)=>i!==fileIdx);
  await sb.from('orders').update({step_files:sf}).eq('id',ordId);
  showToast('File removed');await selectOrder(ordId,true);

function openAddTxOrd(ordId,type){

    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <div class="fg"><label class="fl">Amount *</label><input type="number" class="fi" id="tx-amount" placeholder="0"></div>
      <div class="fg"><label class="fl">Currency</label>
        <select class="fsel" id="tx-currency" style="width:auto" onchange="toggleTxRate(this.value)">
          <option value="USD" selected>USD</option>
          <option value="EUR">EUR</option>
          <option value="CNY">CNY</option>
          <option value="TRY">TRY</option>
          <option value="IRR">IRR</option>
        </select>
      </div>
    </div>
    <div class="fg" id="tx-rate-wrap" style="display:none">
      <label class="fl">Exchange Rate <span class="required-mark">*</span></label>
      <input type="number" class="fi" id="tx-rate" placeholder="e.g. 32 for TRY, 7.2 for CNY" step="any">
      <div style="font-size:11px;color:var(--text3);margin-top:3px" id="tx-rate-hint">1 USD = ? (selected currency) &nbsp;→ e.g. 1 USD = 32 TRY → enter 32</div>
    </div>
    <div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="tx-date"></div>

function toggleTxRate(currency){
  const wrap=document.getElementById('tx-rate-wrap');
  if(wrap) wrap.style.display=currency==='USD'?'none':'';
  const hint=document.getElementById('tx-rate-hint');
  if(hint) hint.textContent=`1 USD = ? ${currency} → enter the rate`;
}
async function saveTxOrd(ordId,type){
  const desc=document.getElementById('tx-desc').value.trim();
  const amount=document.getElementById('tx-amount').value;
  const currency=document.getElementById('tx-currency').value;
  const usd_rate=document.getElementById('tx-rate')?.value||null;
  if(!desc||!amount){showToast('Fill required fields');return;}
  if(currency!=='USD'&&!usd_rate){showToast('Enter exchange rate to USD');return;}
  const dateVal=document.getElementById('tx-date').value;
  const tx={desc,amount:parseFloat(amount),currency,usd_rate:usd_rate?parseFloat(usd_rate):null,date:dateVal?new Date(dateVal).toLocaleDateString('en-GB'):'',notes:document.getElementById('tx-notes').value.trim(),files:[]};
  const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
  const fin=ord?.financials||{receivables:[],payables:[]};
  if(type==='rec') fin.receivables=[...(fin.receivables||[]),tx];
  else fin.payables=[...(fin.payables||[]),tx];
  await sb.from('orders').update({financials:fin}).eq('id',ordId);
  closeModal();showToast('Saved ✓');await selectOrder(ordId,true);renderOrdersList();
}
async function removeTxOrd(ordId,type,idx){
  const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
  const fin=ord?.financials||{receivables:[],payables:[]};
  if(type==='rec') fin.receivables=(fin.receivables||[]).filter((_,i)=>i!==idx);
  else fin.payables=(fin.payables||[]).filter((_,i)=>i!==idx);
  await sb.from('orders').update({financials:fin}).eq('id',ordId);
  await selectOrder(ordId,true);renderOrdersList();
}
async function uploadTxFileOrd(ordId,type,idx,input){
  const file=input.files[0];if(!file)return;
  showToast('Uploading...');
  try{
    const r=await uploadToR2(file,'orders/'+ordId+'/fin');
    const {data:ord}=await sb.from('orders').select('financials').eq('id',ordId).single();
    const fin=ord?.financials||{receivables:[],payables:[]};
    const arr=type==='rec'?fin.receivables:fin.payables;
    if(arr[idx]) arr[idx].files=[...(arr[idx].files||[]),{name:file.name,url:r.url}];
    await sb.from('orders').update({financials:fin}).eq('id',ordId);
    showToast('File attached ✓');await selectOrder(ordId,true);
  }catch(e){showToast('Upload failed');}
}

// MODAL
function openModal(t,h){document.getElementById('modal-title').textContent=t;document.getElementById('modal-body').innerHTML=h;document.getElementById('overlay').classList.remove('hidden')}
function closeModal(){document.getElementById('overlay').classList.add('hidden')}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeModal()}

// CUSTOMER FORM
function channelFieldHtml(ch){
  const cfg=CH_CONFIG[ch]||CH_CONFIG.whatsapp;
  return`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px;margin-top:7px">
    <label class="fl">${cfg.field}</label><input class="fi" id="fc-contact-val" placeholder="${cfg.placeholder}">
  </div>`;
}
function customerFormHtml(c={}){
  const selCh=c.preferred_channel||'whatsapp';
  const chHtml=Object.entries(CH_CONFIG).map(([k,v])=>`<button type="button" class="radio-chip${selCh===k?' active':''}" onclick="selectChannel('${k}')" data-ch="${k}">${v.icon} ${v.label}</button>`).join('');
  const chipsK=CATS.map(cat=>`<button type="button" class="chip${(c.interests?.categories||[]).includes(cat)?' cd':''}" onclick="this.classList.toggle('cd')" data-cat="${cat}">${cat}</button>`).join('');
  const ptChips=PROD_TYPES.map(t=>`<button type="button" class="chip${(c.product_types||[]).includes(t)?' ca':''}" onclick="toggleProdType(this)" data-pt="${t}">${t}</button>`).join('');
  const pr=c.interests?.price_range||{};
  return`
    <div class="fg"><label class="fl">Company / Customer Name</label><input class="fi" id="fc-name" value="${esc(c.name||'')}"></div>
    <div class="fg"><label class="fl">Preferred Communication Channel</label>
      <div class="radio-group" id="ch-group">${chHtml}</div>
      <div id="ch-field-wrap">${channelFieldHtml(selCh)}</div>
    </div>
    <input type="hidden" id="fc-ch" value="${selCh}">
    <script>setTimeout(()=>{const v=document.getElementById('fc-contact-val');if(v)v.value='${esc(c.contact_value||'')}';},0);<\/script>
    <div class="fg"><label class="fl">Send when introducing a new product</label>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <label class="check-row"><input type="checkbox" id="fc-price"${c.send_price?' checked':''}> Price</label>
        <label class="check-row"><input type="checkbox" id="fc-dims"${c.send_dimensions?' checked':''}> Dimensions</label>
        <label class="check-row"><input type="checkbox" id="fc-slab"${c.send_slab_photo?' checked':''}> Slab Photo</label>
      </div>
    </div>
    <div class="fg"><label class="fl">Stone Categories of Interest</label><div class="chip-group" id="chips-cat">${chipsK}</div></div>
    <div class="fg"><label class="fl">Product Type</label><div class="chip-group" id="chips-pt">${ptChips}</div></div>
    <div id="dim-block" style="${(c.product_types||[]).includes('Block')?'':'display:none'}" class="fg"><label class="fl">Block — Min Dimension</label><input class="fi" id="fc-block-dim" value="${esc(c.block_min_dim||'')}"></div>
    <div id="dim-slab" style="${(c.product_types||[]).includes('Slab')?'':'display:none'}" class="fg"><label class="fl">Slab — Min Dimension</label><input class="fi" id="fc-slab-dim" value="${esc(c.slab_min_dim||'')}"></div>
    <div id="dim-cut" style="${(c.product_types||[]).includes('Cut to Size')?'':'display:none'}" class="fg"><label class="fl">Cut to Size — Exact Dimensions</label><input class="fi" id="fc-cut-dim" value="${esc(c.cut_dimensions||'')}"></div>
    <div class="fg"><label class="fl">Max Price</label>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:7px;align-items:end;margin-bottom:7px">
        <input type="number" class="fi" id="fc-pmax" placeholder="e.g. 300" value="${esc(pr.max||'')}">
        <select class="fsel" id="fc-currency" style="width:auto"><option value="USD"${(pr.currency||'USD')==='USD'?' selected':''}>$ USD</option><option value="EUR"${pr.currency==='EUR'?' selected':''}>€ EUR</option><option value="CNY"${pr.currency==='CNY'?' selected':''}>¥ CNY</option></select>
        <select class="fsel" id="fc-term" style="width:auto"><option value="CNF"${(pr.term||'CNF')==='CNF'?' selected':''}>CNF</option><option value="FOB"${pr.term==='FOB'?' selected':''}>FOB</option><option value="CIF"${pr.term==='CIF'?' selected':''}>CIF</option><option value="EXW"${pr.term==='EXW'?' selected':''}>EXW</option></select>
      </div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:7px;align-items:end">
        <select class="fsel" id="fc-unit" style="width:auto"><option value="ton"${(pr.unit||'ton')==='ton'?' selected':''}>/ ton</option><option value="m²"${pr.unit==='m²'?' selected':''}>/ m²</option><option value="m³"${pr.unit==='m³'?' selected':''}>/ m³</option></select>
        <input class="fi" id="fc-dest" placeholder="Destination (e.g. Shanghai)" value="${esc(pr.destination||'')}">
      </div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="fc-notes">${esc(c.interests?.notes||'')}</textarea></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="saveCustomerForm('${c.id||''}')">Save</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>`;
}
function selectChannel(ch){document.querySelectorAll('#ch-group .radio-chip').forEach(el=>el.classList.remove('active'));document.querySelector(`#ch-group [data-ch="${ch}"]`).classList.add('active');document.getElementById('fc-ch').value=ch;document.getElementById('ch-field-wrap').innerHTML=channelFieldHtml(ch);}
function toggleProdType(el){el.classList.toggle('ca');const active=[...document.querySelectorAll('#chips-pt .chip.ca')].map(e=>e.dataset.pt);document.getElementById('dim-block').style.display=active.includes('Block')?'':'none';document.getElementById('dim-slab').style.display=active.includes('Slab')?'':'none';document.getElementById('dim-cut').style.display=active.includes('Cut to Size')?'':'none';}
function openAddCustomer(){openModal('New Customer',customerFormHtml())}
function openEditCustomer(id){const c=customers.find(x=>x.id===id);openModal('Edit Customer',customerFormHtml(c))}
async function saveCustomerForm(id){
  const name=document.getElementById('fc-name').value.trim();if(!name){showToast('Enter customer name');return;}
  const cats=[...document.querySelectorAll('#chips-cat .chip.cd')].map(el=>el.dataset.cat);
  const pts=[...document.querySelectorAll('#chips-pt .chip.ca')].map(el=>el.dataset.pt);
  const ch=document.getElementById('fc-ch').value;
  const contactVal=document.getElementById('fc-contact-val')?.value.trim()||'';
  // Keep existing company_id or use Samin Marble as default
  const existingC=id?customers.find(x=>x.id===id):null;
  const coId=existingC?.company_id||SAMIN_MARBLE_ID;
  const obj={name,company_id:coId,preferred_channel:ch,contact_value:contactVal,contact:contactVal,
    send_price:document.getElementById('fc-price').checked,send_dimensions:document.getElementById('fc-dims').checked,send_slab_photo:document.getElementById('fc-slab').checked,
    product_types:pts,block_min_dim:document.getElementById('fc-block-dim')?.value.trim()||'',slab_min_dim:document.getElementById('fc-slab-dim')?.value.trim()||'',cut_dimensions:document.getElementById('fc-cut-dim')?.value.trim()||'',
    interests:{categories:cats,price_range:{max:document.getElementById('fc-pmax').value,currency:document.getElementById('fc-currency').value,term:document.getElementById('fc-term').value,unit:document.getElementById('fc-unit').value,destination:document.getElementById('fc-dest').value.trim()},notes:document.getElementById('fc-notes').value.trim()}};
  let error;
  if(id){({error}=await sb.from('customers').update(obj).eq('id',id));}else{({error}=await sb.from('customers').insert(obj));}
  if(error){showToast('Error: '+error.message);return;}
  closeModal();showToast('Saved ✓');await loadCustomers();if(id&&selectedId===id)renderDetail();
}

// ORDER FORM
let _transport='S';
function openAddOrder(customerId,customerName,companyId){
  _transport='S';
  const coOptions=companies.map(co=>`<option value="${co.id}"${co.id===companyId?' selected':''}>${co.name} ${co.country==='TR'?'🇹🇷':'🇮🇷'}</option>`).join('');
  openModal(`New Order — ${customerName}`,`
    <div class="fg"><label class="fl">Exporting Company <span class="required-mark">*</span></label><select class="fsel" id="fo-co">${coOptions}</select></div>
    <div class="fg"><label class="fl">Stone / Product <span class="required-mark">*</span></label><input class="fi" id="fo-stone" placeholder="e.g. White Calacatta Marble"></div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <div class="fg"><label class="fl">Quantity</label><input class="fi" id="fo-qty" placeholder="500"></div>
      <div class="fg"><label class="fl">Unit</label><select class="fsel" id="fo-unit"><option value="ton" selected>Ton</option><option value="m²">m²</option><option value="m³">m³</option><option value="pallet">Pallet</option><option value="container">Container</option></select></div>
    </div>
    <div class="fg"><label class="fl">Transport Type</label>
      <div class="chip-group">
        <button type="button" class="chip" id="chip-T" onclick="selTrans('T')">🚛 Land</button>
        <button type="button" class="chip cd" id="chip-S" onclick="selTrans('S')">🚢 Sea</button>
      </div>
    </div>
    <div id="pol-wrap" class="fg"><label class="fl">Port of Load <span class="required-mark">*</span></label><input class="fi" id="fo-pol" placeholder="e.g. Bandar Abbas, Shahid Rajaee"></div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <div class="fg"><label class="fl">Destination <span class="required-mark">*</span></label><input class="fi" id="fo-dest" placeholder="e.g. Shanghai, Dubai"></div>
      <div class="fg"><label class="fl">Delivery Term <span class="required-mark">*</span></label><select class="fsel" id="fo-term"><option value="CNF" selected>CNF</option><option value="FOB">FOB</option><option value="CIF">CIF</option><option value="EXW">EXW</option></select></div>
    </div>
    <div class="section-divider">Agents (optional)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fg"><label class="fl">Shipping Agent Name</label><input class="fi" id="fo-sa-name" placeholder="Agent name"></div>
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="fo-sa-phone" placeholder="+1 234..."></div>
      <div class="fg full"><label class="fl">Email</label><input class="fi" id="fo-sa-email" placeholder="agent@shipping.com"></div>
      <div class="fg"><label class="fl">Customs Agent Name</label><input class="fi" id="fo-ca-name" placeholder="Agent name"></div>
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="fo-ca-phone" placeholder="+1 234..."></div>
      <div class="fg full"><label class="fl">Email</label><input class="fi" id="fo-ca-email" placeholder="agent@customs.com"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveOrder('${customerId}','${companyId}')">Create Order</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`);
}
function selTrans(t){
  _transport=t;
  document.getElementById('chip-T').className='chip'+(t==='T'?' cd':'');
  document.getElementById('chip-S').className='chip'+(t==='S'?' cd':'');
  document.getElementById('pol-wrap').style.display=t==='S'?'':'none';
}
async function saveOrder(customerId,companyId){
  const stone=document.getElementById('fo-stone').value.trim();
  const dest=document.getElementById('fo-dest').value.trim();
  const term=document.getElementById('fo-term').value;
  const pol=_transport==='S'?document.getElementById('fo-pol').value.trim():'';
  if(!stone){showToast('Enter stone name');return;}
  if(!dest){showToast('Enter destination');return;}
  if(_transport==='S'&&!pol){showToast('Enter Port of Load');return;}
  const obj={customer_id:customerId,company_id:document.getElementById('fo-co').value,stone,
    quantity:document.getElementById('fo-qty').value,unit:document.getElementById('fo-unit').value,
    transport_type:_transport,destination:dest,delivery_term:term,port_of_load:pol||null,
    shipping_agent_name:document.getElementById('fo-sa-name').value.trim(),shipping_agent_phone:document.getElementById('fo-sa-phone').value.trim(),shipping_agent_email:document.getElementById('fo-sa-email').value.trim(),
    customs_agent_name:document.getElementById('fo-ca-name').value.trim(),customs_agent_phone:document.getElementById('fo-ca-phone').value.trim(),customs_agent_email:document.getElementById('fo-ca-email').value.trim(),
    current_step:0,step_notes:{},step_dates:{},step_files:{},status:'active'};
  const {error}=await sb.from('orders').insert(obj);
  if(error){showToast('Error: '+error.message);return;}
  closeModal();showToast('Order created ✓');
  if(isAdmin()){detailTab='orders';renderDetail();}else renderAllOrders();
}

(async()=>{const {data:{session}}=await sb.auth.getSession();if(session)await initApp(session.user);})();
</script>
