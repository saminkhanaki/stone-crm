<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Trading CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4f0;--surface:#fff;--surface2:#faf8f5;--border:#e8e2da;--border2:#d6cfc6;
  --text:#1c1a17;--text2:#6b6560;--text3:#9c9590;
  --amber:#c9820a;--amber-light:#fef3dc;--amber-border:#f5d48a;
  --green:#2d7a4f;--green-light:#edf7f2;--green-border:#9fd4b8;
  --blue:#1e6fa8;--blue-light:#e8f4fd;--blue-border:#8ec8f0;
  --red:#c0392b;--red-light:#fdecea;--red-border:#f5b7b1;
  --orange:#e07b00;--orange-light:#fff3e0;--orange-border:#ffcc80;
  --stone-dark:#3d3832;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-icon{width:48px;height:48px;background:var(--stone-dark);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.auth-name{font-size:20px;font-weight:800}.auth-sub{font-size:12px;color:var(--text3);margin-top:2px}
.auth-err{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:11px}
.tb-icon{width:34px;height:34px;background:var(--stone-dark);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:800}.tb-co{font-size:11px;color:var(--text3);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.user-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--text2);font-weight:500}
.tabs-bar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 20px;display:flex;gap:2px;flex-shrink:0}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;font-family:'Inter',sans-serif}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* CUSTOMERS TABLE TAB */
#tab-customers{flex:1;overflow:hidden;display:flex;flex-direction:column}
.ctable-toolbar{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;display:flex;align-items:center;gap:7px;flex:1;min-width:180px}
.search-box input{border:none;background:none;outline:none;width:100%;font-size:13px;font-family:'Inter',sans-serif;color:var(--text)}
.fsel-sm{border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;font-size:12px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.ctable-wrap{flex:1;overflow:auto;padding:0}
.ctable{width:100%;border-collapse:collapse;font-size:13px}
.ctable th{background:var(--surface2);padding:10px 14px;text-align:left;font-weight:700;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
.ctable td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctable tr{cursor:pointer;transition:background .15s}
.ctable tr:hover td{background:var(--surface2)}
.ctable tr.follow-row td{background:var(--orange-light)}
.ctable tr.follow-row:hover td{background:#ffe8c0}
.ctable tr.sel-row td{background:var(--amber-light)}
.follow-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--orange)}
.follow-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.row-num{color:var(--text3);font-size:11px;font-weight:600}

/* CUSTOMER DETAIL PANEL (right side) */
.customer-detail-panel{width:420px;flex-shrink:0;border-left:1.5px solid var(--border);overflow-y:auto;background:var(--surface);display:none}
.customer-detail-panel.open{display:flex;flex-direction:column}

/* TAB CONTENT LAYOUT */
.tab-content-layout{flex:1;overflow:hidden;display:flex}

/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:500;white-space:nowrap}
.b-stone{background:#f2ede8;color:#5a524a;border-color:var(--border)}
.b-amber{background:var(--amber-light);color:#8a5a00;border-color:var(--amber-border)}
.b-green{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.b-blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.b-red{background:var(--red-light);color:var(--red);border-color:var(--red-border)}
.b-orange{background:var(--orange-light);color:var(--orange);border-color:var(--orange-border)}
.b-purple{background:#f5e8ff;color:#6a1a9a;border-color:#d4a8f5}
.b-tr{background:#fff3e0;color:#7a4000;border-color:#ffcc80}
.b-ir{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}

/* DETAIL */
.dhead{padding:16px 20px;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.dname{font-size:17px;font-weight:800}.dsub{font-size:12px;color:var(--text3);margin-top:3px}
.dtabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.dtab{padding:5px 12px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:8px;transition:all .2s;font-family:'Inter',sans-serif}
.dtab.active{background:var(--stone-dark);color:#fff}
.dbody{padding:16px}

/* FOLLOW TOGGLE */
.follow-toggle{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;background:none;font-family:'Inter',sans-serif}
.follow-toggle.off{color:var(--text3);border-color:var(--border)}
.follow-toggle.off:hover{border-color:var(--orange);color:var(--orange)}
.follow-toggle.on{color:var(--orange);border-color:var(--orange);background:var(--orange-light)}

/* FORMS */
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi,.fsel,.fta{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--amber)}.fta{resize:vertical;min-height:72px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fgrid .full{grid-column:1/-1}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;font-weight:500;background:var(--surface2);color:var(--text2)}
.chip:hover{border-color:var(--border2)}.chip.ca{background:var(--amber);color:#fff;border-color:var(--amber)}.chip.cd{background:var(--stone-dark);color:#fff;border-color:var(--stone-dark)}
.radio-group{display:flex;flex-wrap:wrap;gap:6px}
.radio-chip{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;font-weight:500;background:var(--surface2);color:var(--text2)}
.radio-chip.active{background:var(--stone-dark);color:#fff;border-color:var(--stone-dark)}
.check-row{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text2)}
.check-row input{width:15px;height:15px;accent-color:var(--amber);cursor:pointer}
.price-row{display:flex;gap:8px;align-items:flex-end}
.price-row .fi{flex:1}
.price-row .fsel{width:auto;flex-shrink:0}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .18s}
.btn-primary{background:var(--amber);color:#fff}.btn-primary:hover{background:#b57209}
.btn-secondary{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.btn-row{display:flex;gap:8px;margin-top:16px}.btn-row .btn{flex:1}
.btn-dashed{width:100%;border:2px dashed var(--border);border-radius:var(--r);padding:11px;font-size:13px;color:var(--text3);cursor:pointer;background:none;font-family:'Inter',sans-serif;font-weight:600;transition:all .2s;margin-bottom:12px}
.btn-dashed:hover{border-color:var(--amber);color:var(--amber)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,14,8,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border:1.5px solid var(--border)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:1}
.modal-title{font-size:15px;font-weight:800}
.modal-close{width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:20px;color:var(--text3);border-radius:7px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}.modal-body{padding:20px}

/* FOLLOW-UP PANEL */
.follow-panel{background:var(--orange-light);border:1.5px solid var(--orange-border);border-radius:var(--r);padding:14px;margin-bottom:16px}
.follow-panel-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:10px}
.follow-item{background:#fff;border:1px solid var(--orange-border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.follow-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.follow-item-text{font-size:13px;color:var(--text2);flex:1;line-height:1.5}
.follow-item-img{width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;margin-top:6px}
.icon-btn{width:26px;height:26px;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:6px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--red-light);color:var(--red)}

/* WISH */
.wish-add{background:var(--amber-light);border:1.5px solid var(--amber-border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.wish-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.wish-top{display:flex;align-items:flex-start;justify-content:space-between}
.wish-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.wish-sel{font-size:11px;border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-family:'Inter',sans-serif;background:var(--surface);outline:none;cursor:pointer}

/* ORDERS TAB */
#tab-orders{flex:1;overflow:hidden;display:none;flex-direction:column}
.orders-toolbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.orders-grid-wrap{flex:1;overflow-y:auto;padding:16px}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.ord-card{border:1.5px solid var(--border);border-radius:16px;padding:16px;background:var(--surface)}
.ord-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ord-title{font-weight:700;font-size:14px}.ord-sub{font-size:12px;color:var(--text3);margin-top:2px}
.prog-track{background:var(--bg);border-radius:99px;height:6px;margin-bottom:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--amber);transition:width .4s}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:10px}
.steps-list{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto}
.step{border-radius:11px;border:1px solid var(--border);padding:9px 11px}
.step.done{background:var(--green-light);border-color:var(--green-border)}
.step.active{background:var(--amber-light);border-color:var(--amber-border)}
.step.future{background:var(--surface2);opacity:.55}
.step-row{display:flex;align-items:center;gap:8px}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sn-done{background:var(--green);color:#fff}.sn-active{background:var(--amber);color:#fff}.sn-future{background:var(--border);color:var(--text3)}
.step-lbl{font-size:12px;font-weight:500;flex:1}
.sl-done{color:var(--green)}.sl-active{color:#8a5a00;font-weight:700}.sl-future{color:var(--text3)}
.step-date{font-size:10px;color:var(--text3);white-space:nowrap}
.step-note{width:100%;margin-top:6px;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;font-family:'Inter',sans-serif;outline:none;background:#fff}
.step-note:focus{border-color:var(--amber)}

/* PROFILE SECTIONS */
.psec{margin-bottom:16px}
.psec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.info-row{display:flex;flex-wrap:wrap;gap:5px}
hr.div{border:none;border-top:1px solid var(--border);margin:14px 0}
.contact-info-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}

/* EMPTY / LOADER */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:200px;color:var(--text3);text-align:center;gap:8px}
.empty .eicon{font-size:36px;opacity:.45}.empty p{font-size:13px;font-weight:500}
.loader{display:flex;align-items:center;justify-content:center;padding:24px;color:var(--text3);font-size:13px;gap:8px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--stone-dark);color:#fff;padding:10px 22px;border-radius:11px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-preview-overlay img{max-width:90vw;max-height:90vh;border-radius:12px}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon">🪨</div>
      <div><div class="auth-name">Stone Trading CRM</div><div class="auth-sub">Sign in to your account</div></div>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="l-email" placeholder="you@company.com" autocomplete="email"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()" id="l-btn">Sign In</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-icon">🪨</div>
      <div><div class="tb-title">Stone Trading CRM</div><div class="tb-co" id="tb-co">—</div></div>
    </div>
    <div class="tb-right">
      <span class="user-badge" id="user-badge">—</span>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="tabs-bar" id="tabs-bar">
    <!-- tabs injected by JS based on role -->
  </div>
  <div class="main">
    <!-- CUSTOMERS TAB (admin only) -->
    <div id="tab-customers" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div class="ctable-toolbar">
        <div class="search-box"><span style="color:var(--text3)">🔍</span><input type="text" placeholder="Search customers..." id="search-inp" oninput="renderTable()"></div>
        <select class="fsel-sm" id="co-filter" onchange="coFilterChanged(this.value)" style="display:none">
          <option value="">All Companies</option>
        </select>
        <select class="fsel-sm" id="cat-filter" onchange="renderTable()">
          <option value="">All Categories</option>
          <option>Marble</option><option>Travertine</option><option>Granite</option><option>Onyx</option>
          <option>Traonyx</option><option>Marbonyx</option><option>Limestone</option><option>Basalt</option>
          <option>Quartzite</option><option>Sandstone</option>
        </select>
        <select class="fsel-sm" id="follow-filter" onchange="renderTable()">
          <option value="">All Customers</option>
          <option value="follow">🔔 Follow-up Only</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openAddCustomer()" style="margin-left:auto">+ New Customer</button>
      </div>
      <div class="tab-content-layout">
        <div class="ctable-wrap" id="ctable-wrap">
          <div class="loader"><div class="spin"></div> Loading...</div>
        </div>
        <div class="customer-detail-panel" id="detail-panel">
          <div class="empty"><div class="eicon">👆</div><p>Select a customer</p></div>
        </div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div class="orders-toolbar">
        <div class="search-box" style="max-width:300px"><span style="color:var(--text3)">🔍</span><input type="text" placeholder="Search orders..." id="order-search" oninput="renderAllOrders()"></div>
        <select class="fsel-sm" id="order-co-filter" style="display:none" onchange="renderAllOrders()">
          <option value="">All Companies</option>
        </select>
        <span id="orders-count" style="font-size:13px;color:var(--text3);margin-left:8px"></span>
      </div>
      <div class="orders-grid-wrap"><div id="all-orders-grid" class="orders-grid"></div></div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-head"><span class="modal-title" id="modal-title">—</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://zgosrjourokixhkdbfkg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnb3Nyam91cm9raXhoa2RiZmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDEzMDMsImV4cCI6MjA5NDY3NzMwM30.roXzbcJ7aveOviQqL2cwSINt5kbY8c8hrT5jS-ut8lM';
const ADMIN_EMAIL='samin@saminmarble.com';
const SAMIN_MARBLE_ID='a231ce40-e16d-415a-9a2b-7cef0eb3d50b';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let currentUser=null,currentProfile=null,currentCompany=null;

const CATS=['Marble','Travertine','Granite','Onyx','Traonyx','Marbonyx','Limestone','Basalt','Quartzite','Sandstone'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function badge(label,cls='b-stone'){return`<span class="badge ${cls}">${esc(label)}</span>`}
function today(){return new Date().toLocaleDateString('en-GB')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function isAdmin(){return currentUser?.email===ADMIN_EMAIL}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}

// AUTH
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('l-btn');
  const err=document.getElementById('auth-err');
  err.style.display='none';btn.textContent='Signing in...';btn.disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;err.style.display='block';btn.textContent='Sign In';btn.disabled=false;return;}
  await initApp(data.user);
}
async function doLogout(){await sb.auth.signOut();location.reload()}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

// INIT
async function initApp(user){
  currentUser=user;
  const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=prof;
  if(prof?.company_id){
    const {data:comp}=await sb.from('companies').select('*').eq('id',prof.company_id).single();
    currentCompany=comp;
  }
  if(isAdmin()){
    const {data:comps}=await sb.from('companies').select('*').order('name');
    companies=comps||[];
    // company filter in customers tab
    const coSel=document.getElementById('co-filter');
    coSel.style.display='';
    companies.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+(c.country==='TR'?' 🇹🇷':' 🇮🇷');coSel.appendChild(o);});
    // company filter in orders tab
    const ordCoSel=document.getElementById('order-co-filter');
    ordCoSel.style.display='';
    const optAll=document.createElement('option');optAll.value='';optAll.textContent='All Companies';ordCoSel.appendChild(optAll);
    companies.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+(c.country==='TR'?' 🇹🇷':' 🇮🇷');ordCoSel.appendChild(o);});
  }
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-co').textContent=isAdmin()?'Admin — All Companies':currentCompany?.name||'—';
  document.getElementById('user-badge').textContent=prof?.full_name||user.email;

  // build tabs
  const tabsBar=document.getElementById('tabs-bar');
  if(isAdmin()){
    tabsBar.innerHTML=`
      <button class="tab-btn active" onclick="switchTab('customers',this)">👥 Customers</button>
      <button class="tab-btn" onclick="switchTab('orders',this)">📦 Orders</button>`;
    await loadCustomers();
    showTabEl('customers');
  } else {
    tabsBar.innerHTML=`<button class="tab-btn active" onclick="switchTab('orders',this)">📦 Orders</button>`;
    showTabEl('orders');
    await renderAllOrders();
  }
}

function showTabEl(tab){
  document.getElementById('tab-customers').style.display=tab==='customers'?'flex':'none';
  document.getElementById('tab-orders').style.display=tab==='orders'?'flex':'none';
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showTabEl(tab);
  if(tab==='orders') renderAllOrders();
}

// LOAD & SORT CUSTOMERS
async function loadCustomers(){
  document.getElementById('ctable-wrap').innerHTML='<div class="loader"><div class="spin"></div> Loading...</div>';
  let q=sb.from('customers').select('*');
  if(!isAdmin()) q=q.eq('company_id',currentProfile.company_id);
  else if(companyFilter) q=q.eq('company_id',companyFilter);
  const {data,error}=await q;
  if(error){showToast('Error loading customers');return;}
  customers=sortCustomers(data||[]);
  renderTable();
}

function sortCustomers(list){
  const follow=list.filter(c=>c.follow_up).sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
  const rest=list.filter(c=>!c.follow_up).sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
  return [...follow,...rest];
}

function renderTable(){
  const q=document.getElementById('search-inp').value.trim().toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const followOnly=document.getElementById('follow-filter').value==='follow';
  let list=customers.filter(c=>{
    const ms=!q||c.name.toLowerCase().includes(q)||(c.contact_value||'').toLowerCase().includes(q);
    const mc=!cat||(c.interests?.categories||[]).includes(cat);
    const mf=!followOnly||c.follow_up;
    return ms&&mc&&mf;
  });
  const el=document.getElementById('ctable-wrap');
  if(!list.length){el.innerHTML='<div class="empty"><div class="eicon">🪨</div><p>No customers found</p></div>';return;}
  const followCount=list.filter(c=>c.follow_up).length;
  el.innerHTML=`
    <div style="padding:8px 16px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)">
      ${list.length} customers${followCount?` · <span style="color:var(--orange);font-weight:600">🔔 ${followCount} follow-up</span>`:''}
    </div>
    <table class="ctable">
      <thead>
        <tr>
          <th>#</th>
          <th>Customer</th>
          <th>Categories</th>
          <th>Product</th>
          <th>Max Price</th>
          <th>Channel</th>
          ${isAdmin()&&!companyFilter?'<th>Company</th>':''}
          <th>Updated</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((c,i)=>{
          const ch=CH_CONFIG[c.preferred_channel]||CH_CONFIG.whatsapp;
          const cats=(c.interests?.categories||[]).slice(0,2).map(t=>badge(t)).join('');
          const pts=(c.product_types||[]).map(t=>badge(t,'b-blue')).join('');
          const pr=c.interests?.price_range||{};
          const priceStr=pr.max?`${pr.max} ${pr.currency||'$'}/${pr.unit||'m²'} ${pr.term||'CNF'}${pr.destination?' '+pr.destination:''}`:'—';
          const co=companies.find(x=>x.id===c.company_id);
          const isFollowRow=c.follow_up;
          return`<tr class="${isFollowRow?'follow-row':''}${c.id===selectedId?' sel-row':''}" onclick="selectCustomer('${c.id}')">
            <td class="row-num">${i+1}</td>
            <td><div style="font-weight:600;font-size:13px">${isFollowRow?'🔔 ':''}${esc(c.name)}</div>${c.contact?`<div style="font-size:11px;color:var(--text3)">${esc(c.contact)}</div>`:''}</td>
            <td><div style="display:flex;flex-wrap:wrap;gap:3px">${cats}</div></td>
            <td><div style="display:flex;flex-wrap:wrap;gap:3px">${pts}</div></td>
            <td style="font-size:12px;white-space:nowrap">${esc(priceStr)}</td>
            <td>${ch.icon} <span style="font-size:12px">${ch.label}</span></td>
            ${isAdmin()&&!companyFilter?`<td>${co?badge(co.name,co.country==='TR'?'b-tr':'b-ir'):''}</td>`:''}
            <td style="font-size:11px;color:var(--text3);white-space:nowrap">${fmtDate(c.updated_at||c.created_at)}</td>
            <td>${isFollowRow?`<span class="follow-indicator"><span class="follow-dot"></span>Follow</span>`:''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function selectCustomer(id){
  selectedId=id;
  renderTable();
  document.getElementById('detail-panel').classList.add('open');

}

  const [{data:wl},{data:ords}]=await Promise.all([
    sb.from('wishlists').select('*').eq('customer_id',c.id).order('created_at',{ascending:false}),

  ]);
  const tabs=[
    ['profile','Profile'],
    ['wishlist',`Wishlist${wl?.length?' ('+wl.length+')':''}`],
    ['orders',`Orders${ords?.length?' ('+ords.length+')':''}`]
  ];
  const tabsHtml=tabs.map(([t,l])=>`<button class="dtab${detailTab===t?' active':''}" onclick="setDTab('${t}')">${l}</button>`).join('');

  let body='';

  else if(detailTab==='wishlist') body=renderWishlist(c,wl||[]);
  else body=renderOrdersDetail(c,ords||[]);
  document.getElementById('detail-panel').innerHTML=`
    <div class="dhead">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="dname" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</div>
          <div class="dsub" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px">
            ${co?badge(co.name,co.country==='TR'?'b-tr':'b-ir'):''}
            ${(c.product_types||[]).map(t=>badge(t,'b-blue')).join('')}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;align-items:flex-start">
          <button class="follow-toggle ${c.follow_up?'on':'off'}" onclick="toggleFollow('${c.id}',${c.follow_up})">
            ${c.follow_up?'<span class="follow-dot" style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span> Following':'🔔'}
          </button>
          <button class="btn btn-secondary btn-sm" onclick="openEditCustomer('${c.id}')">Edit</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('detail-panel').classList.remove('open');selectedId=null;renderTable()">×</button>

function setDTab(t){detailTab=t;renderDetail()}

async function toggleFollow(id,current){
  await sb.from('customers').update({follow_up:!current}).eq('id',id);
  customers=sortCustomers(customers.map(c=>c.id===id?{...c,follow_up:!current,updated_at:new Date().toISOString()}:c));
  renderTable();renderDetail();
  showToast(current?'Follow-up removed':'Following! 🔔');
}

// PROFILE
function renderProfile(c){
  const ch=CH_CONFIG[c.preferred_channel]||CH_CONFIG.whatsapp;
  const catHtml=(c.interests?.categories||[]).map(t=>badge(t)).join(' ');
  const pr=c.interests?.price_range||{};
  const sends=[];
  if(c.send_price) sends.push(badge('✓ Price','b-green')); else sends.push(badge('✗ Price','b-red'));
  if(c.send_dimensions) sends.push(badge('✓ Dimensions','b-green')); else sends.push(badge('✗ Dimensions','b-red'));
  if(c.send_slab_photo) sends.push(badge('✓ Slab Photo','b-green')); else sends.push(badge('✗ Slab Photo','b-red'));
  let dimHtml='';
  const pts=c.product_types||[];
  if(pts.includes('Block')&&c.block_min_dim) dimHtml+=`<div style="font-size:12px;color:var(--text2);margin-bottom:3px"><strong>Block</strong> min: ${esc(c.block_min_dim)}</div>`;
  if(pts.includes('Slab')&&c.slab_min_dim) dimHtml+=`<div style="font-size:12px;color:var(--text2);margin-bottom:3px"><strong>Slab</strong> min: ${esc(c.slab_min_dim)}</div>`;
  if(pts.includes('Cut to Size')&&c.cut_dimensions) dimHtml+=`<div style="font-size:12px;color:var(--text2)"><strong>Cut to Size</strong>: ${esc(c.cut_dimensions)}</div>`;
  const priceStr=pr.max?`${pr.max} ${pr.currency||'USD'}/${pr.unit||'m²'} ${pr.term||'CNF'}${pr.destination?' — '+pr.destination:''}`:'—';
  const followItems=c.follow_up_items||[];
  const followHtml=c.follow_up?`
    <hr class="div">
    <div class="follow-panel">
      <div class="follow-panel-title">🔔 Follow-up Items</div>
      ${followItems.length?followItems.map((item,i)=>`
        <div class="follow-item">
          <div class="follow-item-top">
            <div class="follow-item-text">${esc(item.text)}</div>
            <button class="icon-btn" onclick="removeFollowItem(${i})">×</button>
          </div>
          ${item.img?`<img src="${esc(item.img)}" class="follow-item-img" onclick="previewImg('${esc(item.img)}')">`:''}
          <div style="font-size:10px;color:var(--text3);margin-top:4px">${item.date||''}</div>
        </div>`).join(''):'<div style="font-size:12px;color:var(--text3)">No items yet</div>'}
      <div style="display:flex;flex-direction:column;gap:7px;margin-top:8px">
        <input class="fi" id="fi-text" placeholder="What needs follow-up?">
        <label style="font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px">
          <input type="file" id="fi-img" accept="image/*" style="display:none" onchange="previewFollowImg(this)">
          📎 Attach photo <span id="fi-img-name" style="font-size:11px;color:var(--text3)"></span>
        </label>
        <button class="btn btn-primary btn-sm" onclick="addFollowItem('${c.id}')">Add</button>
      </div>
    </div>`:'';
  return`
    <div class="psec"><div class="psec-title">Contact</div>
      <div class="contact-info-box">${ch.icon} <strong>${ch.label}:</strong>&nbsp;${esc(c.contact_value||'—')}</div>
    </div>
    <hr class="div">
    <div class="psec"><div class="psec-title">New product notification</div><div class="info-row">${sends.join('')}</div></div>
    <hr class="div">
    <div class="psec"><div class="psec-title">Categories</div><div class="info-row">${catHtml||'—'}</div></div>
    <hr class="div">
    <div class="psec"><div class="psec-title">Max Price</div><span style="font-size:14px;font-weight:700">${esc(priceStr)}</span></div>
    ${dimHtml?`<hr class="div"><div class="psec"><div class="psec-title">Dimensions</div>${dimHtml}</div>`:''}
    ${c.interests?.notes?`<hr class="div"><div class="psec"><div class="psec-title">Notes</div><p style="font-size:12px;color:var(--text2);background:var(--surface2);border-radius:10px;padding:10px;line-height:1.7">${esc(c.interests.notes)}</p></div>`:''}
    ${followHtml}`;

let _followImgData=null;
function previewFollowImg(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('fi-img-name').textContent=file.name;
  const r=new FileReader();r.onload=e=>_followImgData=e.target.result;r.readAsDataURL(file);
}
async function addFollowItem(customerId){
  const text=document.getElementById('fi-text').value.trim();
  if(!text){showToast('Enter description');return;}
  const c=customers.find(x=>x.id===customerId);
  const items=[...(c.follow_up_items||[]),{text,img:_followImgData||null,date:today()}];
  await sb.from('customers').update({follow_up_items:items,updated_at:new Date().toISOString()}).eq('id',customerId);
  customers=sortCustomers(customers.map(x=>x.id===customerId?{...x,follow_up_items:items,updated_at:new Date().toISOString()}:x));
  _followImgData=null;showToast('Added ✓');renderTable();renderDetail();
}
async function removeFollowItem(idx){
  const c=customers.find(x=>x.id===selectedId);
  const items=(c.follow_up_items||[]).filter((_,i)=>i!==idx);
  await sb.from('customers').update({follow_up_items:items}).eq('id',selectedId);
  customers=customers.map(x=>x.id===selectedId?{...x,follow_up_items:items}:x);
  renderDetail();
}
function previewImg(src){
  const d=document.createElement('div');d.className='img-preview-overlay';
  d.innerHTML=`<img src="${esc(src)}">`;d.onclick=()=>d.remove();document.body.appendChild(d);
}

        <input type="number" class="fi" id="w-price" placeholder="Price quoted">
        <select class="fsel" id="w-currency" style="width:auto"><option value="USD">$ USD</option><option value="EUR">€ EUR</option><option value="CNY">¥ CNY</option></select>
        <select class="fsel" id="w-unit" style="width:auto"><option value="m²">/ m²</option><option value="ton">/ ton</option><option value="m³">/ m³</option></select>
        <select class="fsel" id="w-term" style="width:auto"><option value="CNF">CNF</option><option value="FOB">FOB</option><option value="CIF">CIF</option><option value="EXW">EXW</option></select>
      </div>
      <input class="fi" id="w-dest" placeholder="Destination (e.g. Shanghai)" style="margin-bottom:8px">
      <button class="btn btn-primary btn-sm" style="width:100%" onclick="addWishItem('${c.id}','${c.company_id}')">Add to Wishlist</button>
    </div>
    ${list}`;
}

function previewWishImg(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    _wishImgData=e.target.result;
    const prev=document.getElementById('wish-img-preview');
    if(prev) prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  r.readAsDataURL(file);
}

// ORDERS IN DETAIL PANEL
function renderOrdersDetail(c,orders){
  const html=orders.map(o=>{
    const steps=o.transport_type==='T'?STEPS_T:STEPS_S;
    const pct=Math.round((o.current_step/(steps.length-1))*100);
    const cur=steps[o.current_step]?.l||'Completed ✓';
    const stHtml=steps.map((s,i)=>{
      const done=i<o.current_step,active=i===o.current_step;
      const note=(o.step_notes||{})[s.k]||'';
      const date=(o.step_dates||{})[s.k]||'';
      return`<div class="step ${done?'done':active?'active':'future'}">
        <div class="step-row">
          <div class="step-num ${done?'sn-done':active?'sn-active':'sn-future'}">${done?'✓':i+1}</div>
          <span class="step-lbl ${done?'sl-done':active?'sl-active':'sl-future'}">${s.l}</span>
          ${date?`<span class="step-date">${date}</span>`:''}
          ${active?`<button class="btn btn-primary btn-sm" onclick="completeStep('${o.id}','${s.k}',${i},${steps.length})">Done ✓</button>`:''}
        </div>
        ${(active||done)?`<input class="step-note" placeholder="Note..." value="${esc(note)}" onchange="saveStepNote('${o.id}','${s.k}',this.value)">`:''}
      </div>`;
    }).join('');
    return`<div class="ord-card" style="margin-bottom:12px">
      <div class="ord-head">
        <div><div class="ord-title">${esc(o.stone)}</div><div class="ord-sub">${esc(o.quantity||'')} ${esc(o.unit||'')} · ${new Date(o.created_at).toLocaleDateString('en-GB')}</div></div>
        ${badge(o.transport_type==='T'?'🚛 Land':'🚢 Sea',o.transport_type==='T'?'b-amber':'b-blue')}
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-label"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${cur}</span><span style="color:var(--amber);font-weight:700">${pct}%</span></div>
      <div class="steps-list">${stHtml}</div>
    </div>`;
  }).join('');
  return`<button class="btn-dashed" onclick="openAddOrder('${c.id}','${esc(c.name)}','${c.company_id}')">+ New Order</button>
    ${orders.length===0?'<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px">No orders yet</div>':html}`;
}

// WISHLIST ACTIONS
async function addWishItem(customerId,companyId){
  const stone=document.getElementById('w-stone').value.trim();
  if(!stone){showToast('Enter stone name');return;}
  const obj={
    customer_id:customerId,company_id:companyId,stone,
    wish_status:'liked',
    image_data:_wishImgData||null,
    price_amount:document.getElementById('w-price').value||null,
    price_currency:document.getElementById('w-currency').value,
    price_term:document.getElementById('w-term').value,
    price_unit:document.getElementById('w-unit').value,
    price_destination:document.getElementById('w-dest').value.trim(),
    min_dimension:document.getElementById('w-min-dim').value.trim(),
    notes:document.getElementById('w-notes').value.trim()
  };
  const {error}=await sb.from('wishlists').insert(obj);
  if(error){showToast('Error: '+error.message);return;}
  _wishImgData=null;
  showToast('Added to wishlist ✓');renderDetail();
}
async function updateWishStatus(id,val){await sb.from('wishlists').update({wish_status:val}).eq('id',id);renderDetail()}
async function removeWish(id){await sb.from('wishlists').delete().eq('id',id);renderDetail()}

// ORDER STEP ACTIONS
async function completeStep(orderId,stepKey,stepIdx,totalSteps){
  const newStep=Math.min(stepIdx+1,totalSteps-1);
  const {data:ord}=await sb.from('orders').select('step_dates').eq('id',orderId).single();
  const dates={...(ord?.step_dates||{}),[stepKey]:today()};
  await sb.from('orders').update({current_step:newStep,step_dates:dates}).eq('id',orderId);
  showToast('Step completed ✓');renderDetail();
}
async function saveStepNote(orderId,stepKey,val){
  const {data:ord}=await sb.from('orders').select('step_notes').eq('id',orderId).single();
  await sb.from('orders').update({step_notes:{...(ord?.step_notes||{}),[stepKey]:val}}).eq('id',orderId);
}

// ALL ORDERS TAB
async function renderAllOrders(){
  const el=document.getElementById('all-orders-grid');
  el.innerHTML='<div class="loader" style="grid-column:1/-1"><div class="spin"></div> Loading...</div>';
  const q2=document.getElementById('order-search')?.value.trim().toLowerCase()||'';
  const coF=document.getElementById('order-co-filter')?.value||'';
  let q=sb.from('orders').select('*, customers(name,company_id)').eq('status','active').order('created_at',{ascending:false});
  if(!isAdmin()) q=q.eq('company_id',currentProfile.company_id);
  else if(coF) q=q.eq('company_id',coF);
  const {data}=await q;
  let orders=(data||[]).filter(o=>!q2||o.stone.toLowerCase().includes(q2)||(o.customers?.name||'').toLowerCase().includes(q2));
  document.getElementById('orders-count').textContent=orders.length?`${orders.length} active orders`:'';
  if(!orders.length){el.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="eicon">📦</div><p>No active orders</p></div>';return;}
  el.innerHTML=orders.map(o=>{
    const steps=o.transport_type==='T'?STEPS_T:STEPS_S;
    const pct=Math.round((o.current_step/(steps.length-1))*100);
    const cur=steps[o.current_step]?.l||'Completed ✓';
    const co=companies.find(x=>x.id===o.customers?.company_id);
    const stHtml=steps.map((s,i)=>{
      const done=i<o.current_step,active=i===o.current_step;
      const note=(o.step_notes||{})[s.k]||'';
      const date=(o.step_dates||{})[s.k]||'';
      return`<div class="step ${done?'done':active?'active':'future'}">
        <div class="step-row">
          <div class="step-num ${done?'sn-done':active?'sn-active':'sn-future'}">${done?'✓':i+1}</div>
          <span class="step-lbl ${done?'sl-done':active?'sl-active':'sl-future'}">${s.l}</span>
          ${date?`<span class="step-date">${date}</span>`:''}
          ${active?`<button class="btn btn-primary btn-sm" onclick="completeStepGlobal('${o.id}','${s.k}',${i},${steps.length})">Done ✓</button>`:''}
        </div>
        ${(active||done)?`<input class="step-note" placeholder="Note..." value="${esc(note)}" onchange="saveStepNote('${o.id}','${s.k}',this.value)">`:''}
      </div>`;
    }).join('');
    return`<div class="ord-card">
      <div class="ord-head">
        <div>
          <div class="ord-title">${esc(o.stone)}</div>
          <div class="ord-sub" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span>${esc(o.customers?.name||'')}</span>
            ${co?badge(co.name,co.country==='TR'?'b-tr':'b-ir'):''}
            <span>· ${esc(o.quantity||'')} ${esc(o.unit||'')} · ${new Date(o.created_at).toLocaleDateString('en-GB')}</span>
          </div>
        </div>
        ${badge(o.transport_type==='T'?'🚛 Land':'🚢 Sea',o.transport_type==='T'?'b-amber':'b-blue')}
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-label"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${cur}</span><span style="color:var(--amber);font-weight:700">${pct}%</span></div>
      <div class="steps-list">${stHtml}</div>
    </div>`;
  }).join('');
}

async function completeStepGlobal(orderId,stepKey,stepIdx,totalSteps){
  const newStep=Math.min(stepIdx+1,totalSteps-1);
  const {data:ord}=await sb.from('orders').select('step_dates').eq('id',orderId).single();
  const dates={...(ord?.step_dates||{}),[stepKey]:today()};
  await sb.from('orders').update({current_step:newStep,step_dates:dates}).eq('id',orderId);
  showToast('Step completed ✓');renderAllOrders();
}

// MODALS
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('overlay').classList.remove('hidden')}
function closeModal(){document.getElementById('overlay').classList.add('hidden')}
function closeBg(e){if(e.target===document.getElementById('overlay'))closeModal()}

// CUSTOMER FORM
function channelFieldHtml(ch){
  const cfg=CH_CONFIG[ch]||CH_CONFIG.whatsapp;
  return`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px">
    <label class="fl">${cfg.field}</label>
    <input class="fi" id="fc-contact-val" placeholder="${cfg.placeholder}">
  </div>`;
}

function customerFormHtml(c={}){
  const selCh=c.preferred_channel||'whatsapp';
  const selCoId=c.company_id||SAMIN_MARBLE_ID;
  const chHtml=Object.entries(CH_CONFIG).map(([k,v])=>`<button type="button" class="radio-chip${selCh===k?' active':''}" onclick="selectChannel('${k}')" data-ch="${k}">${v.icon} ${v.label}</button>`).join('');
  const chipsK=CATS.map(cat=>`<button type="button" class="chip${(c.interests?.categories||[]).includes(cat)?' cd':''}" onclick="this.classList.toggle('cd')" data-cat="${cat}">${cat}</button>`).join('');
  const ptChips=PROD_TYPES.map(t=>`<button type="button" class="chip${(c.product_types||[]).includes(t)?' ca':''}" onclick="toggleProdType(this,'${t}')" data-pt="${t}">${t}</button>`).join('');
  const pr=c.interests?.price_range||{};
  const coSel=`<div class="fg full"><label class="fl">Company</label><select class="fsel" id="fc-co">
    ${companies.map(co=>`<option value="${co.id}"${selCoId===co.id?' selected':''}>${co.name} ${co.country==='TR'?'🇹🇷':'🇮🇷'}</option>`).join('')}
  </select></div>`;
  return`
    <div class="fgrid">
      ${coSel}
      <div class="fg full"><label class="fl">Company / Customer Name</label><input class="fi" id="fc-name" value="${esc(c.name||'')}"></div>
    </div>
    <div class="fg">
      <label class="fl">Preferred Communication Channel</label>
      <div class="radio-group" id="ch-group">${chHtml}</div>
      <div id="ch-field-wrap">${channelFieldHtml(selCh)}</div>
    </div>
    <input type="hidden" id="fc-ch" value="${selCh}">
    <script>setTimeout(()=>{const v=document.getElementById('fc-contact-val');if(v)v.value='${esc(c.contact_value||'')}';}，0);<\/script>
    <div class="fg"><label class="fl">Send when introducing a new product</label>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <label class="check-row"><input type="checkbox" id="fc-price"${c.send_price?' checked':''}> Price</label>
        <label class="check-row"><input type="checkbox" id="fc-dims"${c.send_dimensions?' checked':''}> Dimensions</label>
        <label class="check-row"><input type="checkbox" id="fc-slab"${c.send_slab_photo?' checked':''}> Slab Photo</label>
      </div>
    </div>
    <div class="fg"><label class="fl">Stone Categories of Interest</label><div class="chip-group" id="chips-cat">${chipsK}</div></div>
    <div class="fg"><label class="fl">Product Type</label><div class="chip-group" id="chips-pt">${ptChips}</div></div>
    <div id="dim-block" style="${(c.product_types||[]).includes('Block')?'':'display:none'}" class="fg"><label class="fl">Block — Min Dimension (e.g. 250x150x100 cm)</label><input class="fi" id="fc-block-dim" value="${esc(c.block_min_dim||'')}"></div>
    <div id="dim-slab" style="${(c.product_types||[]).includes('Slab')?'':'display:none'}" class="fg"><label class="fl">Slab — Min Dimension (e.g. 260x160 cm)</label><input class="fi" id="fc-slab-dim" value="${esc(c.slab_min_dim||'')}"></div>
    <div id="dim-cut" style="${(c.product_types||[]).includes('Cut to Size')?'':'display:none'}" class="fg"><label class="fl">Cut to Size — Exact Dimensions</label><input class="fi" id="fc-cut-dim" value="${esc(c.cut_dimensions||'')}"></div>
    <div class="fg">
      <label class="fl">Max Price</label>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end">
        <input type="number" class="fi" id="fc-pmax" placeholder="e.g. 300" value="${esc(pr.max||'')}">
        <select class="fsel" id="fc-currency" style="width:auto">
          <option value="USD"${(pr.currency||'USD')==='USD'?' selected':''}>$ USD</option>
          <option value="EUR"${pr.currency==='EUR'?' selected':''}>€ EUR</option>
          <option value="CNY"${pr.currency==='CNY'?' selected':''}>¥ CNY</option>
        </select>
        <select class="fsel" id="fc-term" style="width:auto">
          <option value="CNF"${(pr.term||'CNF')==='CNF'?' selected':''}>CNF</option>
          <option value="FOB"${pr.term==='FOB'?' selected':''}>FOB</option>
          <option value="CIF"${pr.term==='CIF'?' selected':''}>CIF</option>
          <option value="EXW"${pr.term==='EXW'?' selected':''}>EXW</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:8px;margin-top:8px;align-items:end">
        <select class="fsel" id="fc-unit" style="width:auto">
          <option value="m²"${(pr.unit||'m²')==='m²'?' selected':''}>/ m²</option>
          <option value="ton"${pr.unit==='ton'?' selected':''}>/ ton</option>
          <option value="m³"${pr.unit==='m³'?' selected':''}>/ m³</option>
        </select>
        <input class="fi" id="fc-dest" placeholder="Destination (e.g. Shanghai, Dubai)" value="${esc(pr.destination||'')}">
      </div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="fc-notes">${esc(c.interests?.notes||'')}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveCustomerForm('${c.id||''}')">Save</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`;
}

function selectChannel(ch){
  document.querySelectorAll('#ch-group .radio-chip').forEach(el=>el.classList.remove('active'));
  document.querySelector(`#ch-group [data-ch="${ch}"]`).classList.add('active');
  document.getElementById('fc-ch').value=ch;
  document.getElementById('ch-field-wrap').innerHTML=channelFieldHtml(ch);
}
function toggleProdType(el){
  el.classList.toggle('ca');
  const active=[...document.querySelectorAll('#chips-pt .chip.ca')].map(e=>e.dataset.pt);
  document.getElementById('dim-block').style.display=active.includes('Block')?'':'none';
  document.getElementById('dim-slab').style.display=active.includes('Slab')?'':'none';
  document.getElementById('dim-cut').style.display=active.includes('Cut to Size')?'':'none';
}

function openAddCustomer(){openModal('New Customer',customerFormHtml())}
function openEditCustomer(id){const c=customers.find(x=>x.id===id);openModal('Edit Customer',customerFormHtml(c))}

async function saveCustomerForm(id){
  const name=document.getElementById('fc-name').value.trim();
  if(!name){showToast('Enter customer name');return;}
  const cats=[...document.querySelectorAll('#chips-cat .chip.cd')].map(el=>el.dataset.cat);
  const pts=[...document.querySelectorAll('#chips-pt .chip.ca')].map(el=>el.dataset.pt);
  const ch=document.getElementById('fc-ch').value;
  const coId=document.getElementById('fc-co')?.value||currentProfile.company_id;
  const contactVal=document.getElementById('fc-contact-val')?.value.trim()||'';
  const obj={
    name,company_id:coId,
    preferred_channel:ch,contact_value:contactVal,contact:contactVal,
    send_price:document.getElementById('fc-price').checked,
    send_dimensions:document.getElementById('fc-dims').checked,
    send_slab_photo:document.getElementById('fc-slab').checked,
    product_types:pts,
    block_min_dim:document.getElementById('fc-block-dim')?.value.trim()||'',
    slab_min_dim:document.getElementById('fc-slab-dim')?.value.trim()||'',
    cut_dimensions:document.getElementById('fc-cut-dim')?.value.trim()||'',
    interests:{
      categories:cats,
      price_range:{
        max:document.getElementById('fc-pmax').value,
        currency:document.getElementById('fc-currency').value,
        term:document.getElementById('fc-term').value,
        unit:document.getElementById('fc-unit').value,
        destination:document.getElementById('fc-dest').value.trim()
      },
      notes:document.getElementById('fc-notes').value.trim()
    }
  };
  let error;
  if(id){({error}=await sb.from('customers').update(obj).eq('id',id));}
  else{({error}=await sb.from('customers').insert(obj));}
  if(error){showToast('Error: '+error.message);return;}
  closeModal();showToast('Saved ✓');
  await loadCustomers();
  if(id&&selectedId===id) renderDetail();
}

// ORDER FORM
let _transport='S';
function openAddOrder(customerId,customerName,companyId){
  _transport='S';
  openModal(`New Order — ${customerName}`,`
    <div class="fgrid">
      <div class="fg full"><label class="fl">Stone / Product</label><input class="fi" id="fo-stone" placeholder="e.g. White Calacatta Marble Slab"></div>
      <div class="fg"><label class="fl">Quantity</label><input class="fi" id="fo-qty" placeholder="500"></div>
      <div class="fg"><label class="fl">Unit</label><select class="fsel" id="fo-unit"><option>m²</option><option>Ton</option><option>m³</option><option>Pallet</option><option>Container</option></select></div>
      <div class="fg full"><label class="fl">Transport Type</label>
        <div class="chip-group">
          <button type="button" class="chip" id="chip-T" onclick="selTrans('T')">🚛 Land (T) — Direct by truck</button>
          <button type="button" class="chip cd" id="chip-S" onclick="selTrans('S')">🚢 Sea (S) — Truck to port + ship</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveOrder('${customerId}','${companyId}')">Create Order</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

}
function selTrans(t){_transport=t;document.getElementById('chip-T').className='chip'+(t==='T'?' cd':'');document.getElementById('chip-S').className='chip'+(t==='S'?' cd':'')}
async function saveOrder(customerId,companyId){
  const stone=document.getElementById('fo-stone').value.trim();
  if(!stone){showToast('Enter stone name');return;}
  await sb.from('orders').insert({customer_id:customerId,company_id:companyId,stone,quantity:document.getElementById('fo-qty').value,unit:document.getElementById('fo-unit').value,transport_type:_transport,current_step:0,step_notes:{},step_dates:{},status:'active'});
  closeModal();showToast('Order created ✓');
  if(isAdmin()){detailTab='orders';renderDetail();}
  else renderAllOrders();
}

(async()=>{

  if(session) await initApp(session.user);
